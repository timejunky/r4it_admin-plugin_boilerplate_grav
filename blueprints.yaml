name: r4it Admin Plugin Boilerplate
slug: r4it_admin_plugin_boilerplate
type: plugin
version: 0.2.0
description: GrayGate-style admin tool-page boilerplate (Method 2).
icon: wrench
homepage: https://github.com/timejunky/r4it_admin-plugin_boilerplate_grav

author:
  name: r4it

form:
  validation: strict
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        tab_general:
          type: tab
          title: General
          fields:
            enabled:
              type: toggle
              label: PLUGIN_ADMIN.PLUGIN_STATUS
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

        tab_settings:
          type: tab
          title: Settings
          fields:
            boilerplate_hint:
              type: display
              label: " "
              markdown: true
              content: "This plugin is a boilerplate. Settings belong to your derived plugin."
