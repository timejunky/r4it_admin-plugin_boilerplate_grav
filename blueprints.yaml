name: R4IT Admin Plugin Boilerplate
slug: r4it_admin_plugin_boilerplate
type: plugin
version: 0.2.1
description: Admin tool-page boilerplate for Grav CMS.
icon: flask
homepage: https://github.com/timejunky/r4it_admin-plugin_boilerplate_grav
bugs: https://github.com/timejunky/r4it_admin-plugin_boilerplate_grav/issues
docs: https://github.com/timejunky/r4it_admin-plugin_boilerplate_grav#readme
license: MIT
keywords:
  - grav
  - plugin
  - admin
  - boilerplate

dependencies:
  - { name: grav, version: '>=1.7.0' }
  - { name: admin, version: '>=1.10.0' }

author:
  name: r4it
  homepage: https://github.com/timejunky

form:
  validation: strict
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        tab_general:
          type: tab
          title: General
          fields:
            enabled:
              type: toggle
              label: PLUGIN_ADMIN.PLUGIN_STATUS
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

        tab_settings:
          type: tab
          title: Settings
          fields:
            boilerplate_hint:
              type: display
              label: " "
              markdown: true
              content: "This plugin is a boilerplate. Settings belong to your derived plugin."
